<html>
<head>

      display: flex;

      min-height: 100vh;
      margin: 0;
    }

    .card {
      background: white;

    h1 {
      color: #0066cc;
    }

    button {
      background: #0066cc;
      color: white;
      border: none;
      padding: 12px 25px;
      border-radius: 10px;
      font-size: 16px;
    }
  </style>
</head>

<body>
  <div class="card">
    <h1>Hello, I am Miracle! 👋</h1>

    <p>I am learning coding on my phone.</p>

    <p>My goal is to become a web developer and make money building websites.</p>

    <button>Contact Me</button>
  </div>
</body>
</html>
