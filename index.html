<!DOCTYPE html>
<html>
<head>
<style>
body {
  background: #dfe6ee;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  margin: 0;
}

.card {
  background: white;
  padding: 30px;
  border-radius: 20px;
  box-shadow: 0 4px 15px rgba(0,0,0,0.1);
  text-align: center;
  max-width: 350px;
}

h1 {
  color: #0066cc;
}

button {
  background: #0066cc;
  color: white;
  border: none;
  padding: 12px 24px;
  border-radius: 10px;
  font-size: 18px;
  margin-top: 20px;
}
</style>
</head>

<body>
  <div class="card">
    <h1>Hello, I am Miracle! 👋</h1>
    <p>I am learning coding on my phone.</p>
    <p>My goal is to become a web developer and make money building websites.</p>
    <button>Contact Me</button>
  </div>
</body>
</html>
